<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>TIIP / SAIL CRM</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/17.0.2/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>

<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#f0f4f2;color:#1a2e22;min-height:100vh}
:root{
  --green:#1e6b42;--green2:#2e8653;--green-light:#e4f2ea;
  --gold:#b8922a;--gold-light:#fdf5e0;
  --border:#d8e4dc;--card:#fff;--muted:#6b8070;
  --red:#c0392b;--orange:#d4681a;--blue:#1a6fa8;--purple:#6a3c9a;
}

/* TOPBAR */
.topbar{background:#163626;color:#fff;height:54px;display:flex;align-items:center;justify-content:space-between;padding:0 22px;position:sticky;top:0;z-index:100;box-shadow:0 2px 8px rgba(0,0,0,.22)}
.logo{display:flex;align-items:center;gap:11px}
.logo-sq{background:var(--gold);color:#163626;font-weight:900;font-size:14px;border-radius:7px;width:36px;height:36px;display:flex;align-items:center;justify-content:center}
.logo-name{font-size:16px;font-weight:700}
.logo-sub{font-size:10px;color:#8dbfa0;letter-spacing:.3px}
.topbar-right{display:flex;align-items:center;gap:10px;font-size:12px;color:#8dbfa0}

/* NAV */
.nav{background:#fff;border-bottom:2px solid var(--border);display:flex;padding:0 22px;overflow-x:auto}
.nav-btn{padding:12px 18px;font-size:13px;font-weight:600;color:var(--muted);border:none;background:none;cursor:pointer;border-bottom:3px solid transparent;transition:all .15s;white-space:nowrap}
.nav-btn:hover{color:var(--green)}
.nav-btn.active{color:var(--green);border-bottom-color:var(--green)}

/* MAIN */
.main{padding:22px;max-width:1400px;margin:0 auto}

/* CARD */
.card{background:var(--card);border-radius:11px;border:1px solid var(--border);box-shadow:0 1px 4px rgba(0,0,0,.05)}
.card-hd{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-size:13px;font-weight:700;color:#163626}
.card-body{padding:16px 18px}

/* TABLE */
.tbl-wrap{overflow-x:auto;border-radius:10px;border:1px solid var(--border)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead th{background:#f6faf7;font-weight:700;text-align:left;padding:9px 13px;color:var(--muted);font-size:10px;text-transform:uppercase;letter-spacing:.5px;border-bottom:1px solid var(--border);white-space:nowrap;cursor:pointer;user-select:none}
thead th:hover{color:var(--green)}
tbody tr{border-bottom:1px solid #eef3ef;transition:background .1s}
tbody tr:last-child{border-bottom:none}
tbody tr:hover{background:var(--green-light)}
td{padding:9px 13px;vertical-align:middle}

/* BADGE */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;font-size:10px;font-weight:700;white-space:nowrap}

/* BTN */
.btn{display:inline-flex;align-items:center;gap:5px;padding:7px 14px;border-radius:8px;font-size:12px;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:var(--green2);color:#fff}.btn-primary:hover{background:#256b40}
.btn-secondary{background:#f0f4f2;color:#1a2e22;border:1px solid var(--border)}.btn-secondary:hover{background:var(--border)}
.btn-danger{background:var(--red);color:#fff}.btn-danger:hover{background:#a93226}
.btn-gold{background:var(--gold);color:#fff}.btn-gold:hover{background:#9a7a22}
.btn-blue{background:var(--blue);color:#fff}.btn-blue:hover{background:#155d8e}
.btn-sm{padding:4px 10px;font-size:11px}
.btn-xs{padding:3px 8px;font-size:10px}

/* FILTER BAR */
.filter-bar{display:flex;gap:9px;flex-wrap:wrap;align-items:center;margin-bottom:14px}
.fi{padding:7px 11px;border-radius:8px;border:1px solid var(--border);font-size:12px;color:#1a2e22;background:#fff}
.fi:focus{outline:none;border-color:var(--green)}
.fi.stretch{flex:1;min-width:180px}

/* MODAL */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.44);z-index:200;display:flex;align-items:center;justify-content:center;padding:16px}
.modal{background:#fff;border-radius:13px;width:100%;max-width:620px;max-height:92vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.24)}
.modal-wide{max-width:820px}
.modal-hd{padding:18px 22px 14px;border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;background:#fff;z-index:1}
.modal-title{font-size:15px;font-weight:700}
.modal-close{background:none;border:none;font-size:22px;cursor:pointer;color:var(--muted);line-height:1}
.modal-body{padding:18px 22px}
.modal-foot{padding:14px 22px 18px;display:flex;gap:9px;justify-content:flex-end;border-top:1px solid var(--border)}

/* FORM */
.fg{margin-bottom:13px}
.fl{font-size:11px;font-weight:700;color:var(--muted);margin-bottom:4px;display:block;text-transform:uppercase;letter-spacing:.5px}
.finp{width:100%;padding:8px 11px;border-radius:8px;border:1px solid var(--border);font-size:13px;color:#1a2e22;background:#fff}
.finp:focus{outline:none;border-color:var(--green);box-shadow:0 0 0 3px rgba(30,107,66,.1)}
textarea.finp{resize:vertical;min-height:68px}
.frow{display:grid;grid-template-columns:1fr 1fr;gap:13px}
.frow3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:13px}
@media(max-width:600px){.frow,.frow3{grid-template-columns:1fr}}
.ferr{color:var(--red);font-size:11px;margin-top:3px}

/* SECTION HEADER */
.sec-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sec-title{font-size:18px;font-weight:700;color:#163626}
.sec-sub{font-size:12px;color:var(--muted);margin-top:2px}

/* INNER TABS */
.itabs{display:flex;gap:6px;margin-bottom:16px;flex-wrap:wrap}
.itab{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:#f0f4f2;color:var(--muted);transition:all .15s}
.itab.active{background:var(--green2);color:#fff;border-color:var(--green2)}
.itab.blue-active.active{background:var(--blue);border-color:var(--blue)}
.itab.purple-active.active{background:var(--purple);border-color:var(--purple)}

/* KANBAN */
.kanban-wrap{overflow-x:auto;padding-bottom:12px}
.kanban{display:flex;gap:10px;min-width:max-content}
.kb-col{width:190px;flex-shrink:0}
.kb-hd{padding:9px 12px;border-radius:8px 8px 0 0;font-size:11px;font-weight:700;display:flex;justify-content:space-between;align-items:center;border:1px solid var(--border);border-bottom:none}
.kb-body{min-height:120px;border-radius:0 0 8px 8px;border:1px solid var(--border);background:#fafcfa;padding:7px;display:flex;flex-direction:column;gap:5px;transition:background .15s}
.kb-body.drag-over{background:#e4f2ea;border-color:var(--green2);border-style:dashed}
.kb-card{background:#fff;border:1px solid var(--border);border-radius:7px;padding:9px 11px;cursor:grab;transition:box-shadow .15s,opacity .15s;font-size:12px;user-select:none}
.kb-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.1)}
.kb-card.is-dragging{opacity:.4;cursor:grabbing}
.kb-card-name{font-weight:700;margin-bottom:2px;font-size:12px}
.kb-card-contact{color:var(--muted);font-size:11px}
.kb-card-amt{color:var(--green2);font-weight:600;font-size:11px;margin-top:3px}
.kb-card-prob{font-size:10px;color:var(--muted)}
.kb-hold{margin-top:14px}
.kb-hold-title{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:8px;padding:0 4px}

/* COMMAND CENTER */
.cc-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
@media(max-width:900px){.cc-grid{grid-template-columns:1fr}}
.cc-welcome{margin-bottom:20px}
.cc-welcome h1{font-size:22px;font-weight:800;color:#163626}
.cc-welcome p{font-size:13px;color:var(--muted);margin-top:3px}
.stale-row{display:flex;align-items:center;gap:10px;padding:10px 13px;border-radius:9px;background:#fff;border:1px solid var(--border);margin-bottom:7px;cursor:pointer;transition:box-shadow .15s}
.stale-row:hover{box-shadow:0 3px 10px rgba(0,0,0,.08)}
.stale-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0}
.stale-info{flex:1}
.stale-name{font-weight:700;font-size:13px}
.stale-org{font-size:11px;color:var(--muted)}
.stale-days{font-size:11px;font-weight:700;white-space:nowrap}
.renewal-row{display:flex;align-items:center;justify-content:space-between;padding:10px 13px;border-radius:9px;background:#fff;border:1px solid var(--border);margin-bottom:7px}
.task-item{display:flex;align-items:flex-start;gap:10px;padding:10px 13px;border-radius:9px;background:#fff;border:1px solid var(--border);margin-bottom:6px}
.task-cb{width:16px;height:16px;border-radius:4px;border:2px solid var(--border);cursor:pointer;flex-shrink:0;margin-top:1px;display:flex;align-items:center;justify-content:center}
.task-cb.done{background:var(--green2);border-color:var(--green2)}
.task-text{flex:1;font-size:13px}
.task-text.done{text-decoration:line-through;color:var(--muted)}

/* CONTACT DETAIL */
.det-row{display:flex;gap:5px;align-items:flex-start;margin-bottom:10px;font-size:13px}
.det-lbl{min-width:110px;font-size:11px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;padding-top:1px}
.det-val{flex:1}
.pipeline-chip{display:inline-flex;align-items:center;gap:5px;padding:4px 10px;border-radius:6px;font-size:12px;font-weight:600;margin-bottom:5px;margin-right:5px}

/* CORRESPONDENCE */
.corr-timeline{display:flex;flex-direction:column;gap:0}
.corr-item{display:flex;gap:12px;padding:12px 0;border-bottom:1px solid var(--border)}
.corr-item:last-child{border-bottom:none}
.corr-dot{width:8px;height:8px;border-radius:50%;margin-top:5px;flex-shrink:0}
.corr-body{flex:1}
.corr-header{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:3px}
.corr-subject{font-weight:700;font-size:13px}
.corr-date{font-size:11px;color:var(--muted)}
.corr-text{font-size:12px;color:#444;line-height:1.5}
.corr-type{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.4px;margin-bottom:2px}

/* REPORTS */
.kpi-row{display:flex;gap:12px;flex-wrap:wrap;margin-bottom:18px}
.kpi{background:var(--card);border-radius:10px;border:1px solid var(--border);padding:14px 18px;min-width:140px;flex:1;border-left:4px solid var(--green2)}
.kpi.gold{border-left-color:var(--gold)}
.kpi.blue{border-left-color:var(--blue)}
.kpi.purple{border-left-color:var(--purple)}
.kpi-val{font-size:24px;font-weight:800;color:#163626;line-height:1}
.kpi-lbl{font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-top:4px}
.report-section{margin-bottom:22px}
.report-section-title{font-size:13px;font-weight:700;color:#163626;text-transform:uppercase;letter-spacing:.5px;margin-bottom:10px;padding-bottom:6px;border-bottom:2px solid var(--green-light)}
.hbar-row{display:flex;align-items:center;gap:8px;margin-bottom:7px;font-size:12px}
.hbar-label{min-width:150px;text-align:right;color:var(--muted);font-size:11px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hbar-track{flex:1;height:20px;background:#f0f4f2;border-radius:4px;overflow:hidden}
.hbar-fill{height:100%;border-radius:4px;display:flex;align-items:center;padding:0 8px;font-size:11px;font-weight:700;color:#fff;min-width:4px;transition:width .4s}
.hbar-val{min-width:70px;font-size:11px;font-weight:600}

/* IMPORT */
.import-row{display:flex;align-items:center;gap:8px;padding:8px 11px;border-radius:7px;background:#f8faf9;border:1px solid var(--border);margin-bottom:6px;font-size:12px}
.import-err{color:var(--red)}
.import-ok{color:var(--green2)}

/* AUTH */
.auth-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,#163626 0%,#1e4d34 100%)}
.auth-box{background:#fff;border-radius:16px;padding:40px 44px;width:100%;max-width:420px;box-shadow:0 24px 64px rgba(0,0,0,.28);text-align:center}
.auth-logo{display:inline-flex;align-items:center;justify-content:center;width:56px;height:56px;background:var(--gold);border-radius:14px;font-size:20px;font-weight:900;color:#163626;margin-bottom:20px}
.auth-title{font-size:22px;font-weight:800;color:#163626;margin-bottom:4px}
.auth-sub{font-size:13px;color:var(--muted);margin-bottom:28px}
.auth-input{width:100%;padding:11px 14px;border-radius:9px;border:1.5px solid var(--border);font-size:15px;text-align:center;letter-spacing:2px;margin-bottom:12px}
.auth-input:focus{outline:none;border-color:var(--green2)}
.auth-err{color:var(--red);font-size:12px;margin-bottom:10px}
.auth-btn{width:100%;padding:12px;border-radius:9px;background:var(--green2);color:#fff;border:none;font-size:15px;font-weight:700;cursor:pointer}
.auth-btn:hover{background:#256b40}

/* MISC */
.empty{text-align:center;padding:32px;color:var(--muted);font-size:13px}
.tag-ts{background:#dbeafe;color:#1e40af;border-radius:4px;font-size:10px;font-weight:700;padding:2px 5px}
.tag-ob{background:#dcfce7;color:#166534;border-radius:4px;font-size:10px;font-weight:700;padding:2px 5px}
.warn-bg{background:var(--gold-light)!important}
.flex{display:flex}.gap-8{gap:8px}.gap-10{gap:10px}.items-c{align-items:center}.jsb{justify-content:space-between}
.mb-14{margin-bottom:14px}.mb-18{margin-bottom:18px}.mt-8{margin-top:8px}.mt-12{margin-top:12px}
.txt-muted{color:var(--muted);font-size:12px}.fw7{font-weight:700}.cursor-p{cursor:pointer}
.sync-bar{background:#163626;color:#8dbfa0;font-size:12px;padding:4px 22px;display:flex;align-items:center;gap:10px}
.sync-dot{width:8px;height:8px;border-radius:50%;background:#4caf80;flex-shrink:0}
.sync-dot.pulse{animation:pulse 1.5s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Multi-select contact picker */
.contact-picker{border:1px solid var(--border);border-radius:8px;max-height:160px;overflow-y:auto;background:#fff}
.contact-picker-item{display:flex;align-items:center;gap:9px;padding:7px 11px;cursor:pointer;font-size:13px;transition:background .1s}
.contact-picker-item:hover{background:var(--green-light)}
.contact-picker-item input{cursor:pointer}

/* Loading */
.loading-screen{min-height:100vh;display:flex;align-items:center;justify-content:center;background:#f0f4f2}
.spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--green2);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* PRINT */
@media print{
  .topbar,.nav,.sync-bar,.nav-btn,.btn,.filter-bar,.itabs,.no-print{display:none!important}
  .main{padding:0}
  .report-print-area{display:block!important}
  body{background:#fff}
  .kpi{border:1px solid #ccc;break-inside:avoid}
  .card{box-shadow:none;border:1px solid #ccc}
  .report-section{break-inside:avoid}
}
</style>

/* ── UTILITIES ──────────────────────────────────────────── */
const TODAY = new Date();
const fmtAmt = n => n ? "$"+Number(n).toLocaleString() : "TBD";
const fmtDate = d => {
  if(!d) return "—";
  const dt = new Date(d+"T12:00:00");
  return dt.toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"});
};
const daysSince = d => {
  if(!d) return null;
  return Math.round((TODAY - new Date(d+"T12:00:00"))/86400000);
};
const daysUntil = d => {
  if(!d) return null;
  return Math.round((new Date(d+"T12:00:00") - TODAY)/86400000);
};
const genId = () => Math.random().toString(36).slice(2,10);
const allStages = pipeKey => {
  const p = PIPELINES[pipeKey];
  return p ? [...p.stages, ...p.holdStages] : [];
};

/* ── SHARED COMPONENTS ──────────────────────────────────── */
function Modal({title,onClose,children,footer,wide}){
  return (
    <div className="overlay" onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className={`modal${wide?" modal-wide":""}`}>
        <div className="modal-hd">
          <span className="modal-title">{title}</span>
          <button className="modal-close" onClick={onClose}>×</button>
        </div>
        <div className="modal-body">{children}</div>
        {footer&&<div className="modal-foot">{footer}</div>}
      </div>
    </div>
  );
}

function Confirm({msg,onYes,onNo}){
  return (
    <Modal title="Confirm" onClose={onNo}
      footer={<><button className="btn btn-secondary" onClick={onNo}>Cancel</button><button className="btn btn-danger" onClick={onYes}>Delete</button></>}>
      <p style={{fontSize:14,lineHeight:1.5}}>{msg}</p>
    </Modal>
  );
}

function StageBadge({stage,pipeline}){
  const p = pipeline ? PIPELINES[pipeline] : null;
  const color = p ? p.color : "#555";
  const bg = p ? p.bg : "#eee";
  return <span className="badge" style={{background:bg,color}}>{stage}</span>;
}

function PipeBadge({pipeline}){
  const p = PIPELINES[pipeline];
  if(!p) return null;
  return <span className="badge" style={{background:p.bg,color:p.color,fontSize:"10px"}}>{p.label}</span>;
}

function HBar({data,color}){
  const max = Math.max(...data.map(d=>d.value),1);
  return <div>{data.filter(d=>d.value>0).map((d,i)=>(
    <div key={i} className="hbar-row">
      <div className="hbar-label" title={d.name}>{d.name}</div>
      <div className="hbar-track">
        <div className="hbar-fill" style={{width:Math.max(3,Math.round(d.value/max*100))+"%",background:color||"#2e8653"}}>
          {Math.round(d.value/max*100)>20?d.label||d.value:""}
        </div>
      </div>
      <div className="hbar-val">{d.label||d.value}</div>
    </div>
  ))}</div>;
}

  return (

/* ── COMMAND CENTER ──────────────────────────────────────── */
function CommandCenter({contacts,opportunities,tasks,saveTask,deleteTask,onViewContact,bccEmails,saveBccEmail,saveNote}){
  const [newTask,setNewTask]=useState("");
  const [bccLinks,setBccLinks]=useState({});
  const today = new Date();
  const days = d => daysSince(d);

  const staleContacts = useMemo(()=>{
    return [...contacts]
      .map(c=>({...c,ds:days(c.lastContact)||999}))
      .filter(c=>c.ds>30)
      .sort((a,b)=>b.ds-a.ds);
  },[contacts]);

  const renewals = useMemo(()=>{
    return opportunities
      .filter(o=>o.pipeline==="subscriber" && o.stage==="Subscriber" && o.renewalDate)
      .map(o=>{
        const du = daysUntil(o.renewalDate);
        const pc = contacts.find(c=>c.id===o.primaryContactId);
        return {...o,daysUntil:du,contact:pc};
      })
      .filter(o=>o.daysUntil!=null && o.daysUntil<=120)
      .sort((a,b)=>a.daysUntil-b.daysUntil);
  },[opportunities,contacts]);

  const pendingTasks = tasks.filter(t=>!t.done);
  const doneTasks = tasks.filter(t=>t.done);

  const addTask = () => {
    if(!newTask.trim()) return;
    saveTask({id:genId(),text:newTask.trim(),done:false,createdAt:new Date().toISOString()});
    setNewTask("");
  };

  const staleColor = ds => ds>90?"#c0392b":ds>60?"#d4681a":"#b8922a";

  const dateStr = today.toLocaleDateString("en-US",{weekday:"long",month:"long",day:"numeric",year:"numeric"});

  return (
    <div>
      <div className="cc-welcome">
        <h1>Good morning, Bill</h1>
        <p>{dateStr}</p>
      </div>

      <div className="cc-grid">
        {/* FOLLOW UP */}
        <div>
          <div className="card">
            <div className="card-hd">
              <span className="card-title">⏰ Follow Up Needed <span style={{color:staleColor(60),fontSize:"11px",marginLeft:6}}>{staleContacts.length} contacts</span></span>
            </div>
            <div className="card-body" style={{maxHeight:360,overflowY:"auto"}}>
              {staleContacts.length===0&&<div className="empty">All contacts recently touched ✓</div>}
              {staleContacts.map(c=>(
                <div key={c.id} className="stale-row" onClick={()=>onViewContact(c)}>
                  <div className="stale-dot" style={{background:staleColor(c.ds)}}/>
                  <div className="stale-info">
                    <div className="stale-name">{c.name}</div>
                    <div className="stale-org">{c.organization}</div>
                  </div>
                  <div className="stale-days" style={{color:staleColor(c.ds)}}>{c.ds}d ago</div>
                </div>
              ))}
            </div>
          </div>

          {/* BCC INBOX */}
          {(()=>{
            const pending=(bccEmails||[]).filter(e=>!e.reviewed);
            return (
              <div className="card mt-12">
                <div className="card-hd">
                  <span className="card-title">📬 BCC Inbox
                    {pending.length>0&&<span style={{marginLeft:6,fontSize:11,color:"#1a6fa8",fontWeight:700}}>{pending.length} new</span>}
                  </span>
                  <span style={{fontSize:10,color:"#6b8070"}}>TIIPbizdev@gmail.com</span>
                </div>
                <div className="card-body" style={{maxHeight:300,overflowY:"auto"}}>
                  {pending.length===0&&<div className="empty" style={{fontSize:12}}>No new emails. BCC TIIPbizdev@gmail.com to capture.</div>}
                  {pending.map(e=>{
                    const autoMatch=contacts.find(c=>c.email&&c.email.toLowerCase()===e.sender_email.toLowerCase());
                    const selectedId=autoMatch?.id||bccLinks[e.id]||"";
                    const selectedContact=contacts.find(c=>c.id===selectedId);
                    const dismiss=()=>saveBccEmail({...e,reviewed:true});
                    const logNote=()=>{
                      if(!selectedContact) return;
                      saveNote({id:genId(),contactId:selectedContact.id,type:"Email",subject:e.subject,body:e.body||e.body_snippet||"",date:(e.received_at||"").split("T")[0]||new Date().toISOString().split("T")[0]});
                      saveBccEmail({...e,reviewed:true,contact_id:selectedContact.id});
                    };
                    return (
                      <div key={e.id} style={{borderBottom:"1px solid #e8f0eb",padding:"10px 0"}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
                          <div style={{minWidth:0}}>
                            <div style={{fontWeight:700,fontSize:13}}>{e.sender_name||e.sender_email}</div>
                            <div style={{fontSize:11,color:"#6b8070"}}>{e.sender_email}</div>
                            <div style={{fontSize:12,fontWeight:600,marginTop:2}}>{e.subject}</div>
                            {e.body_snippet&&<div style={{fontSize:11,color:"#6b8070",marginTop:2}}>{e.body_snippet.slice(0,120)}{e.body_snippet.length>120?"…":""}</div>}
                          </div>
                          <div style={{fontSize:10,color:"#b0c4b8",whiteSpace:"nowrap"}}>{(e.received_at||"").split("T")[0]}</div>
                        </div>
                        <div style={{display:"flex",alignItems:"center",gap:6,marginTop:7,flexWrap:"wrap"}}>
                          {autoMatch
                            ?<span style={{fontSize:10,color:"#1e6b42",background:"#e4f2ea",padding:"2px 7px",borderRadius:10}}>✓ {autoMatch.name}</span>
                            :<select className="fi" style={{fontSize:11,padding:"3px 7px",height:"auto"}}
                              value={bccLinks[e.id]||""}
                              onChange={ev=>setBccLinks(m=>({...m,[e.id]:ev.target.value}))}>
                              <option value="">— Link to contact —</option>
                              {contacts.map(c=><option key={c.id} value={c.id}>{c.name} · {c.organization}</option>)}
                            </select>
                          }
                          {selectedContact&&<button className="btn btn-xs btn-primary" onClick={logNote}>Log Email Note</button>}
                          <button className="btn btn-xs btn-secondary" onClick={dismiss}>Dismiss</button>
                        </div>
                      </div>
                    );
                  })}
                </div>
              </div>
            );
          })()}
        </div>

        {/* RENEWALS */}

            <div className="card-body" style={{maxHeight:180,overflowY:"auto"}}>
              {renewals.length===0&&<div className="empty">No renewals due in the next 120 days</div>}

                    <div className="txt-muted">{fmtAmt(o.amount)}</div>
                  </div>
                </div>
              ))}
            </div>
          </div>

          {/* TASKS */}
          <div className="card mt-12">
            <div className="card-hd"><span className="card-title">✅ Tasks</span></div>
            <div className="card-body">
              <div style={{display:"flex",gap:8,marginBottom:10}}>
                <input className="finp fi stretch" value={newTask} onChange={e=>setNewTask(e.target.value)}
                  onKeyDown={e=>e.key==="Enter"&&addTask()} placeholder="Add a task…"/>
                <button className="btn btn-primary btn-sm" onClick={addTask}>Add</button>
              </div>
              {pendingTasks.map(t=>(
                <div key={t.id} className="task-item">
                  <div className="task-cb" onClick={()=>saveTask({...t,done:true})}>
                    <span style={{color:"#fff",fontSize:9}}>✓</span>
                  </div>
                  <div className="task-text">{t.text}</div>
                  <button className="btn btn-xs btn-secondary" onClick={()=>deleteTask(t.id)}>×</button>
                </div>
              ))}
              {doneTasks.length>0&&(
                <div style={{marginTop:8,borderTop:"1px solid var(--border)",paddingTop:8}}>
                  {doneTasks.slice(0,3).map(t=>(
                    <div key={t.id} className="task-item" style={{opacity:.6}}>
                      <div className="task-cb done" onClick={()=>saveTask({...t,done:false})}>
                        <span style={{color:"#fff",fontSize:9}}>✓</span>
                      </div>
                      <div className="task-text done">{t.text}</div>
                      <button className="btn btn-xs btn-secondary" onClick={()=>deleteTask(t.id)}>×</button>
                    </div>
                  ))}
                </div>
              )}
              {pendingTasks.length===0&&doneTasks.length===0&&<div className="empty">No tasks yet</div>}
            </div>
          </div>
        </div>
      </div>
    </div>
  );
}

/* ── BULK UPLOAD ────────────────────────────────────────── */
function BulkUpload({onImport,onClose}){
  const [rows,setRows]=useState(null);
  const [errors,setErrors]=useState([]);
  const fileRef=useRef();

  const downloadTemplate=()=>{
    const ws = XLSX.utils.aoa_to_sheet([
      ["Name","Email","Phone","Organization","Org Type","Title","Last Contact (YYYY-MM-DD)","Notes"],
      ["Jane Smith","jane@example.org","+1 555 000 0000","Example Foundation","Foundation","Investment Director","2026-04-01","Met at conference"]
    ]);
    const wb = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(wb,ws,"Contacts");
    XLSX.writeFile(wb,"TIIP_Contact_Template.xlsx");
  };

  const handleFile=e=>{
    const file=e.target.files[0]; if(!file) return;
    const reader=new FileReader();
    reader.onload=ev=>{
      const wb=XLSX.read(ev.target.result,{type:"binary"});
      const ws=wb.Sheets[wb.SheetNames[0]];
      const data=XLSX.utils.sheet_to_json(ws,{defval:""});
      const errs=[];
      const parsed=data.map((row,i)=>{
        const name=(row["Name"]||"").toString().trim();
        const email=(row["Email"]||"").toString().trim();
        const org=(row["Organization"]||"").toString().trim();
        const orgType=(row["Org Type"]||"Foundation").toString().trim();
        const phone=(row["Phone"]||"").toString().trim();
        const title=(row["Title"]||"").toString().trim();
        const lastContact=(row["Last Contact (YYYY-MM-DD)"]||"").toString().trim();
        const notes=(row["Notes"]||"").toString().trim();
        if(!name) errs.push(`Row ${i+2}: Name is required`);
        return {id:genId(),name,email,phone,organization:org,orgType:ORG_TYPES.includes(orgType)?orgType:"Other",title,lastContact,notes,_row:i+2,_ok:!!name};
      });
      setRows(parsed); setErrors(errs);
    };
    reader.readAsBinaryString(file);
  };

  const doImport=()=>{
    const valid=rows.filter(r=>r._ok).map(({_row,_ok,...r})=>r);
    onImport(valid); onClose();
  };

  return (
    <Modal title="Import Contacts" onClose={onClose}
      footer={rows&&<><button className="btn btn-secondary" onClick={onClose}>Cancel</button><button className="btn btn-primary" onClick={doImport} disabled={!rows||rows.filter(r=>r._ok).length===0}>Import {rows?rows.filter(r=>r._ok).length:0} Contacts</button></>}>
      {!rows?(
        <div>
          <p style={{fontSize:13,marginBottom:16,color:"#444",lineHeight:1.6}}>Download the Excel template, fill it in with your contacts, then upload it here. Required fields will be validated before import.</p>
          <div className="flex gap-8 mb-14" style={{marginBottom:14}}>
            <button className="btn btn-secondary" onClick={downloadTemplate}>⬇ Download Template</button>
            <button className="btn btn-primary" onClick={()=>fileRef.current.click()}>⬆ Upload File</button>
            <input ref={fileRef} type="file" accept=".xlsx,.xls,.csv" style={{display:"none"}} onChange={handleFile}/>
          </div>
          <p className="txt-muted">Supported: .xlsx, .xls, .csv</p>
        </div>
      ):(
        <div>
          <div className="flex jsb items-c mb-14" style={{marginBottom:10}}>
            <span style={{fontSize:13,fontWeight:700}}>{rows.filter(r=>r._ok).length} of {rows.length} rows valid</span>
            <button className="btn btn-secondary btn-sm" onClick={()=>{setRows(null);setErrors([]);}}>Upload Different File</button>
          </div>
          {errors.length>0&&<div style={{background:"#fff1f0",border:"1px solid #fca5a5",borderRadius:8,padding:"10px 14px",marginBottom:12,fontSize:12,color:"#c0392b"}}>{errors.map((e,i)=><div key={i}>{e}</div>)}</div>}
          <div style={{maxHeight:280,overflowY:"auto"}}>
            {rows.slice(0,20).map((r,i)=>(
              <div key={i} className={`import-row ${r._ok?"import-ok":"import-err"}`}>
                <span style={{fontSize:14,marginRight:8}}>{r._ok?"✓":"✗"}</span>
                <span style={{fontWeight:700,minWidth:140}}>{r.name||"(no name)"}</span>
                <span className="txt-muted">{r.organization} · {r.email||"no email"}</span>
              </div>
            ))}
            {rows.length>20&&<div className="txt-muted" style={{padding:"6px 11px"}}>…and {rows.length-20} more</div>}
          </div>
        </div>
      )}
    </Modal>
  );
}

/* ── CONTACTS VIEW ──────────────────────────────────────── */
function ContactsView({contacts,opportunities,correspondence,bccEmails,saveContact,deleteContact,saveNote,deleteNote}){
  const [search,setSearch]=useState("");
  const [orgFilter,setOrgFilter]=useState("");
  const [sortKey,setSortKey]=useState("name");
  const [sortDir,setSortDir]=useState(1);
  const [selected,setSelected]=useState(null);
  const [editing,setEditing]=useState(null);
  const [showAdd,setShowAdd]=useState(false);
  const [showImport,setShowImport]=useState(false);
  const [confirm,setConfirm]=useState(null);

  const filtered = useMemo(()=>{
    let r=[...contacts];
    if(search) r=r.filter(c=>`${c.name} ${c.organization} ${c.email}`.toLowerCase().includes(search.toLowerCase()));
    if(orgFilter) r=r.filter(c=>c.orgType===orgFilter);
    r.sort((a,b)=>{
      const av=a[sortKey]||"",bv=b[sortKey]||"";
      if(sortKey==="lastContact") return sortDir*(new Date(bv)-new Date(av));
      return sortDir*(av.toString().localeCompare(bv.toString()));
    });
    return r;
  },[contacts,search,orgFilter,sortKey,sortDir]);

  const sort=(k)=>{if(sortKey===k)setSortDir(d=>-d);else{setSortKey(k);setSortDir(1);}};
  const arrow=k=>sortKey===k?(sortDir===1?"↑":"↓"):"";

  const handleEdit=(c)=>{setEditing(c);setSelected(null);};
  const handleDelete=(id)=>{setConfirm(id);};

  return (
    <div>
      {confirm&&<Confirm msg="Delete this contact? This cannot be undone." onYes={()=>{deleteContact(confirm);setConfirm(null);}} onNo={()=>setConfirm(null)}/>}
      {(showAdd||editing)&&<ContactForm contact={editing} onSave={c=>{saveContact(c);setEditing(null);setShowAdd(false);}} onClose={()=>{setShowAdd(false);setEditing(null);}}/>}
      {showImport&&<BulkUpload onImport={cs=>cs.forEach(c=>saveContact(c))} onClose={()=>setShowImport(false)}/>}
      {selected&&<ContactDetail contact={selected} opportunities={opportunities} correspondence={correspondence}
        bccEmails={bccEmails} onClose={()=>setSelected(null)} onEdit={()=>handleEdit(selected)} onDelete={id=>{deleteContact(id);setSelected(null);}}
        saveNote={saveNote} deleteNote={deleteNote}/>}

      <div className="sec-hd">
        <div><div className="sec-title">Contacts</div><div className="sec-sub">{contacts.length} total</div></div>
        <div className="flex gap-8">
          <button className="btn btn-secondary btn-sm" onClick={()=>setShowImport(true)}>⬆ Import</button>
          <button className="btn btn-primary" onClick={()=>setShowAdd(true)}>+ Add Contact</button>
        </div>
      </div>

      <div className="filter-bar">
        <input className="fi stretch" placeholder="Search name, org, email…" value={search} onChange={e=>setSearch(e.target.value)}/>
        <select className="fi" value={orgFilter} onChange={e=>setOrgFilter(e.target.value)}>
          <option value="">All types</option>
          {ORG_TYPES.map(t=><option key={t}>{t}</option>)}
        </select>
      </div>

      <div className="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th onClick={()=>sort("name")}>Name {arrow("name")}</th>
              <th onClick={()=>sort("organization")}>Organization {arrow("organization")}</th>
              <th>Org Type</th>
              <th>Email</th>
              <th onClick={()=>sort("lastContact")}>Last Contact {arrow("lastContact")}</th>
              <th>Pipelines</th>
              <th></th>
            </tr>
          </thead>
          <tbody>
            {filtered.length===0&&<tr><td colSpan={7}><div className="empty">No contacts match</div></td></tr>}
            {filtered.map(c=>{
              const ds=daysSince(c.lastContact);
              const myOpps=opportunities.filter(o=>o.contactIds&&o.contactIds.includes(c.id));
              return (
                <tr key={c.id} onClick={()=>setSelected(c)} style={{cursor:"pointer"}}>
                  <td style={{fontWeight:600}}>{c.name}</td>
                  <td>{c.organization||"—"}</td>
                  <td><span className="badge" style={{background:"#e4f2ea",color:"#1e6b42",fontSize:10}}>{c.orgType||"—"}</span></td>
                  <td style={{fontSize:12,color:"#555"}}>{c.email||"—"}</td>
                  <td style={{fontSize:12}}>
                    {c.lastContact?<span style={{color:ds>60?"#c0392b":ds>30?"#d4681a":"#1e6b42",fontWeight:600}}>{fmtDate(c.lastContact)}</span>:"—"}
                  </td>
                  <td>{myOpps.map(o=><PipeBadge key={o.id} pipeline={o.pipeline}/>)}</td>
                  <td onClick={e=>e.stopPropagation()}>
                    <div className="flex gap-8">
                      <button className="btn btn-xs btn-secondary" onClick={()=>handleEdit(c)}>Edit</button>
                      <button className="btn btn-xs btn-danger" onClick={()=>handleDelete(c.id)}>Del</button>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

/* ── OPP FORM ───────────────────────────────────────────── */
function OppForm({opp,pipeline,contacts,onSave,onClose}){

  const [f,setF]=useState(opp?{...opp}:blank);
  const [cSearch,setCSearch]=useState("");
  const upd=(k,v)=>setF(prev=>({...prev,[k]:v}));

  const filteredContacts=contacts.filter(c=>
    !cSearch||`${c.name} ${c.organization}`.toLowerCase().includes(cSearch.toLowerCase())
  ).slice(0,50);

  const toggleContact=(id)=>{
    const ids=f.contactIds.includes(id)?f.contactIds.filter(x=>x!==id):[...f.contactIds,id];
    const primary=ids.length>0?(ids.includes(f.primaryContactId)?f.primaryContactId:ids[0]):"";

  };

  const onStageChange=(s)=>{
    const prob=STAGE_PROB[s]!=null?STAGE_PROB[s]:f.probability;

  };

  const save=()=>{
    if(!f.name.trim()){alert("Name is required");return;}
    onSave(f); onClose();

  return (

      <div className="fg">
        <label className="fl">Contacts</label>

            <div key={c.id} className="contact-picker-item" onClick={()=>toggleContact(c.id)}>

    </Modal>

}

/* ── KANBAN ─────────────────────────────────────────────── */
function KanbanView({opps,pipeline,contacts,onEdit,onAdd,updateOppStage}){
  const p=PIPELINES[pipeline];
  const [dragging,setDragging]=useState(null);
  const [dragOver,setDragOver]=useState(null);

  const getContact=(o)=>contacts.find(c=>c.id===o.primaryContactId);
  const col=(stage)=>opps.filter(o=>o.stage===stage);
  const wv=(o)=>Math.round((o.amount||0)*(o.probability||0)/100);

  const pipeColor={subscriber:"var(--green2)",capital:"var(--blue)",projects:"var(--purple)"}[pipeline]||"var(--green2)";

  const renderCard=(o)=>{
    const c=getContact(o);
    return (
      <div key={o.id} className={`kb-card${dragging===o.id?" is-dragging":""}`}
        draggable onDragStart={()=>setDragging(o.id)} onDragEnd={()=>{setDragging(null);setDragOver(null);}}
        onClick={()=>onEdit(o)}>
        <div className="kb-card-name">{o.name}</div>
        {c&&<div className="kb-card-contact">{c.name}</div>}
        <div className="kb-card-amt">{fmtAmt(o.amount)}</div>
        <div className="kb-card-prob">{o.probability}% · {fmtAmt(wv(o))} wtd</div>
      </div>
    );
  };

  const renderCol=(stage,isHold)=>{
    const cards=col(stage);
    const hd={};
    if(!isHold){hd.background=pipeColor+"22";hd.color=pipeColor;}
    else{hd.background="#f5f5f5";hd.color="#888";}
    return (
      <div key={stage} className="kb-col">
        <div className="kb-hd" style={hd}>
          <span>{stage}</span>
          <span style={{fontSize:10,opacity:.7}}>{cards.length}</span>
        </div>
        <div className={`kb-body${dragOver===stage?" drag-over":""}`}
          onDragOver={e=>{e.preventDefault();setDragOver(stage);}}
          onDrop={e=>{e.preventDefault();if(dragging){updateOppStage(dragging,stage,pipeline);}setDragging(null);setDragOver(null);}}>
          {cards.map(renderCard)}
        </div>
      </div>
    );
  };

  return (
    <div>
      <div className="kanban-wrap">
        <div className="kanban">
          {p.stages.map(s=>renderCol(s,false))}
        </div>
      </div>
      {p.holdStages.some(s=>opps.filter(o=>o.stage===s).length>0)&&(
        <div className="kb-hold">
          <div className="kb-hold-title">Parking Lot</div>
          <div className="kanban">
            {p.holdStages.map(s=>renderCol(s,true))}
          </div>
        </div>
      )}
    </div>
  );
}

/* ── PIPELINE TABLE ─────────────────────────────────────── */
function PipelineTable({opps,pipeline,contacts,onEdit,onDelete}){
  const [sortKey,setSortKey]=useState("name");
  const [sortDir,setSortDir]=useState(1);
  const [confirm,setConfirm]=useState(null);
  const p=PIPELINES[pipeline];

  const sort=(k)=>{if(sortKey===k)setSortDir(d=>-d);else{setSortKey(k);setSortDir(1);}};
  const arrow=k=>sortKey===k?(sortDir===1?"↑":"↓"):"";

  const sorted=[...opps].sort((a,b)=>{
    if(sortKey==="amount"||sortKey==="probability") return sortDir*(b[sortKey]-a[sortKey]);
    if(sortKey==="closeDate"||sortKey==="renewalDate"){
      const ad=a[sortKey]||"9999",bd=b[sortKey]||"9999";
      return sortDir*(ad<bd?-1:1);
    }
    return sortDir*((a[sortKey]||"").toString().localeCompare((b[sortKey]||"").toString()));
  });

  const getContact=(o)=>contacts.find(c=>c.id===o.primaryContactId);
  const wv=(o)=>Math.round((o.amount||0)*(o.probability||0)/100);

  return (
    <>
      {confirm&&<Confirm msg="Delete this opportunity?" onYes={()=>{onDelete(confirm);setConfirm(null);}} onNo={()=>setConfirm(null)}/>}
      <div className="tbl-wrap">
        <table>
          <thead>
            <tr>
              <th onClick={()=>sort("name")}>Name {arrow("name")}</th>
              <th>Primary Contact</th>
              <th onClick={()=>sort("stage")}>Stage {arrow("stage")}</th>
              <th onClick={()=>sort("amount")}>Amount {arrow("amount")}</th>
              <th onClick={()=>sort("probability")}>Prob% {arrow("probability")}</th>
              <th>Weighted</th>
              <th onClick={()=>sort(pipeline==="subscriber"?"renewalDate":"closeDate")}>{pipeline==="subscriber"?"Renewal":"Close Date"} {arrow(pipeline==="subscriber"?"renewalDate":"closeDate")}</th>
              {pipeline==="projects"&&<th>Type</th>}
              <th></th>
            </tr>
          </thead>
          <tbody>
            {sorted.length===0&&<tr><td colSpan={8}><div className="empty">No opportunities yet. Click + Add to get started.</div></td></tr>}
            {sorted.map(o=>{
              const c=getContact(o);
              const dateField=pipeline==="subscriber"?o.renewalDate:o.closeDate;
              const du=daysUntil(dateField);
              return (
                <tr key={o.id}>
                  <td style={{fontWeight:600,cursor:"pointer"}} onClick={()=>onEdit(o)}>{o.name}</td>
                  <td style={{fontSize:12}}>{c?c.name:"—"}</td>
                  <td><StageBadge stage={o.stage} pipeline={pipeline}/></td>
                  <td style={{fontWeight:600,color:"var(--green2)"}}>{fmtAmt(o.amount)}</td>
                  <td>{o.probability}%</td>
                  <td style={{color:"var(--muted)",fontSize:12}}>{fmtAmt(wv(o))}</td>
                  <td style={{fontSize:12}}>
                    {dateField?<span style={{color:du!=null&&du<30?"var(--red)":du!=null&&du<90?"var(--orange)":"inherit"}}>{fmtDate(dateField)}</span>:"—"}
                  </td>
                  {pipeline==="projects"&&<td style={{fontSize:12}}>{o.projectType||"—"}</td>}
                  <td>
                    <div className="flex gap-8">
                      <button className="btn btn-xs btn-secondary" onClick={()=>onEdit(o)}>Edit</button>
                      <button className="btn btn-xs btn-danger" onClick={()=>setConfirm(o.id)}>Del</button>
                    </div>
                  </td>
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </>
  );
}

/* ── PIPELINES VIEW ─────────────────────────────────────── */
function PipelinesView({contacts,opportunities,saveOpp,deleteOpp}){
  const [pipeline,setPipeline]=useState("subscriber");
  const [view,setView]=useState("kanban");
  const [showForm,setShowForm]=useState(false);
  const [editOpp,setEditOpp]=useState(null);

  const myOpps=opportunities.filter(o=>o.pipeline===pipeline);
  const p=PIPELINES[pipeline];

  const handleEdit=(o)=>{setEditOpp(o);setShowForm(true);};
  const handleAdd=()=>{setEditOpp(null);setShowForm(true);};
  const handleSave=(o)=>{saveOpp(o);setShowForm(false);setEditOpp(null);};
  const updateOppStage=(id,stage)=>{
    const o=opportunities.find(x=>x.id===id);
    if(!o) return;
    const prob=STAGE_PROB[stage]!=null?STAGE_PROB[stage]:o.probability;
    saveOpp({...o,stage,probability:prob});
  };

  const pipeColors={subscriber:"",capital:" blue-active",projects:" purple-active"};

  return (
    <div>
      {showForm&&<OppForm opp={editOpp} pipeline={pipeline} contacts={contacts} onSave={handleSave} onClose={()=>{setShowForm(false);setEditOpp(null);}}/>}
      <div className="sec-hd">
        <div><div className="sec-title">Pipelines</div><div className="sec-sub">{myOpps.length} opportunities in {p.label}</div></div>
        <button className="btn btn-primary" onClick={handleAdd}>+ Add Opportunity</button>
      </div>

      <div className="flex jsb items-c mb-14" style={{marginBottom:14}}>
        <div className="itabs">
          {Object.entries(PIPELINES).map(([key,pl])=>(
            <button key={key} className={`itab${pipeColors[key]}${pipeline===key?" active":""}`} onClick={()=>setPipeline(key)}>
              {pl.label} <span style={{fontSize:10,opacity:.7}}>({opportunities.filter(o=>o.pipeline===key).length})</span>
            </button>
          ))}
        </div>
        <div className="flex gap-8">
          <button className={`btn btn-sm ${view==="kanban"?"btn-primary":"btn-secondary"}`} onClick={()=>setView("kanban")}>Kanban</button>
          <button className={`btn btn-sm ${view==="table"?"btn-primary":"btn-secondary"}`} onClick={()=>setView("table")}>Table</button>
        </div>
      </div>

      {view==="kanban"
        ?<KanbanView opps={myOpps} pipeline={pipeline} contacts={contacts} onEdit={handleEdit} onAdd={handleAdd} updateOppStage={updateOppStage}/>
        :<PipelineTable opps={myOpps} pipeline={pipeline} contacts={contacts} onEdit={handleEdit} onDelete={deleteOpp}/>
      }
    </div>
  );
}

  const subPipe=opportunities.filter(o=>o.pipeline==="subscriber"&&!["Subscriber","Loss","Unqualified"].includes(o.stage));
  const subPipeVal=subPipe.reduce((s,o)=>s+(o.amount||0),0);

            {opportunities.filter(o=>o.pipeline==="capital").length>0&&(
              <div className="report-section">
                <div className="report-section-title">All Opportunities</div>
                <div className="tbl-wrap">
                  <table>
                    <thead><tr><th>Name</th><th>Contact</th><th>Stage</th><th>Amount</th><th>Prob%</th><th>Weighted</th><th>Close Date</th></tr></thead>
                    <tbody>
                      {opportunities.filter(o=>o.pipeline==="capital"&&o.stage!=="Loss").map(o=>{
                        const c=contacts.find(x=>x.id===o.primaryContactId);
                        return (
                          <tr key={o.id}>
                            <td style={{fontWeight:600}}>{o.name}</td>
                            <td>{c?.name||"—"}</td>
                            <td><StageBadge stage={o.stage} pipeline="capital"/></td>
                            <td style={{color:"#1a6fa8",fontWeight:600}}>{fmtAmt(o.amount)}</td>
                            <td>{o.probability}%</td>
                            <td style={{color:"var(--muted)",fontSize:12}}>{fmtAmt(Math.round((o.amount||0)*(o.probability||0)/100))}</td>
                            <td style={{fontSize:12}}>{fmtDate(o.closeDate)}</td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                </div>
              </div>
            )}
          </div>
        )}
      </div>
    </div>
  );
}

/* ── MESSAGES VIEW ──────────────────────────────────────── */
function MessagesView({bccEmails,contacts,saveBccEmail,saveNote}){
  const [search,setSearch]=useState("");
  const [filter,setFilter]=useState("all");
  const [viewEmail,setViewEmail]=useState(null);
  const [linkMap,setLinkMap]=useState({});

  const filtered=useMemo(()=>{
    let r=[...(bccEmails||[])];
    if(filter==="unreviewed") r=r.filter(e=>!e.reviewed);
    if(filter==="reviewed") r=r.filter(e=>e.reviewed);
    if(search) r=r.filter(e=>`${e.sender_name||""} ${e.sender_email||""} ${e.subject||""}`.toLowerCase().includes(search.toLowerCase()));
    return r.sort((a,b)=>new Date(b.received_at)-new Date(a.received_at));
  },[bccEmails,filter,search]);

  const linkContact=(emailId,contactId)=>{
    const email=(bccEmails||[]).find(e=>e.id===emailId);
    if(!email) return;
    saveBccEmail({...email,contact_id:contactId});
  };

  const logAndReview=(email,contactId)=>{
    const c=contacts.find(x=>x.id===contactId);
    if(!c) return;
    saveNote({id:genId(),contactId,type:"Email",subject:email.subject,body:email.body||email.body_snippet||"",date:(email.received_at||"").split("T")[0]});
    saveBccEmail({...email,reviewed:true,contact_id:contactId});
  };

  return (
    <div>
      <div className="sec-hd">
        <div>
          <div className="sec-title">📬 Messages</div>
          <div className="sec-sub">All BCC-captured emails · TIIPbizdev@gmail.com</div>
        </div>
      </div>

      <div className="filter-bar">
        <input className="fi stretch" placeholder="Search sender, subject…" value={search} onChange={e=>setSearch(e.target.value)}/>
        <div className="itabs" style={{margin:0}}>
          {[["all","All"],["unreviewed","Unreviewed"],["reviewed","Reviewed"]].map(([k,l])=>(
            <button key={k} className={`itab${filter===k?" active":""}`} onClick={()=>setFilter(k)}>{l} {k==="all"?(bccEmails||[]).length:k==="unreviewed"?(bccEmails||[]).filter(e=>!e.reviewed).length:(bccEmails||[]).filter(e=>e.reviewed).length}</button>
          ))}
        </div>
      </div>

      {viewEmail&&(
        <Modal title={viewEmail.subject||"(no subject)"} onClose={()=>setViewEmail(null)} wide>
          <div className="det-row"><div className="det-lbl">From</div><div className="det-val">{viewEmail.sender_name||viewEmail.sender_email}{viewEmail.sender_name&&<span style={{color:"var(--muted)",fontSize:11,marginLeft:6}}>&lt;{viewEmail.sender_email}&gt;</span>}</div></div>
          <div className="det-row"><div className="det-lbl">Date</div><div className="det-val">{fmtDate((viewEmail.received_at||"").split("T")[0])}</div></div>
          {viewEmail.contact_id&&<div className="det-row"><div className="det-lbl">Linked To</div><div className="det-val" style={{color:"var(--green2)",fontWeight:700}}>{contacts.find(c=>c.id===viewEmail.contact_id)?.name||"—"}</div></div>}
          <div style={{marginTop:14,padding:"14px",background:"#f8faf9",borderRadius:8,border:"1px solid var(--border)",fontFamily:"monospace",fontSize:12,lineHeight:1.7,whiteSpace:"pre-wrap",maxHeight:400,overflowY:"auto"}}>
            {viewEmail.body||viewEmail.body_snippet||"(no body saved — emails captured before this update only have a 600-char snippet)"}
          </div>
        </Modal>
      )}

      {filtered.length===0&&<div className="empty">No messages found.</div>}

      {filtered.length>0&&(
        <div className="tbl-wrap">
          <table>
            <thead>
              <tr>
                <th style={{width:90}}>Date</th>
                <th>From</th>
                <th>Subject</th>
                <th style={{width:200}}>Linked Contact</th>
                <th style={{width:90}}>Status</th>
                <th style={{width:130}}></th>
              </tr>
            </thead>
            <tbody>
              {filtered.map(e=>{
                const linked=contacts.find(c=>c.id===e.contact_id);
                const autoMatch=!e.contact_id&&contacts.find(c=>c.email&&c.email.toLowerCase()===e.sender_email.toLowerCase());
                const pendingLink=linkMap[e.id]||"";
                return (
                  <tr key={e.id}>
                    <td style={{whiteSpace:"nowrap",fontSize:11,color:"var(--muted)"}}>{(e.received_at||"").split("T")[0]}</td>
                    <td>
                      <div style={{fontWeight:600,fontSize:12}}>{e.sender_name||e.sender_email}</div>
                      <div style={{fontSize:10,color:"var(--muted)"}}>{e.sender_name?e.sender_email:""}</div>
                    </td>
                    <td style={{fontSize:12}}>{e.subject}</td>
                    <td>
                      {linked
                        ?<span style={{fontSize:11,color:"var(--green2)",fontWeight:600}}>✓ {linked.name}</span>
                        :<select className="fi" style={{fontSize:11,padding:"3px 7px",width:"100%"}}
                          value={pendingLink}
                          onChange={ev=>setLinkMap(m=>({...m,[e.id]:ev.target.value}))}>
                          <option value="">— Link to contact —</option>
                          {autoMatch&&<option value={autoMatch.id}>✓ {autoMatch.name} (auto)</option>}
                          {contacts.filter(c=>!autoMatch||c.id!==autoMatch.id).map(c=>(
                            <option key={c.id} value={c.id}>{c.name} · {c.organization}</option>
                          ))}
                        </select>
                      }
                    </td>
                    <td>
                      <span className="badge" style={{background:e.reviewed?"#e4f2ea":"#fdf5e0",color:e.reviewed?"#1e6b42":"#b8922a",fontSize:10}}>
                        {e.reviewed?"Reviewed":"Pending"}
                      </span>
                    </td>
                    <td>
                      <div style={{display:"flex",gap:4,justifyContent:"flex-end"}}>
                        <button className="btn btn-xs btn-secondary" onClick={()=>setViewEmail(e)}>View</button>
                        {!linked&&pendingLink&&(
                          <button className="btn btn-xs btn-secondary" onClick={()=>{
                            linkContact(e.id,pendingLink);
                            setLinkMap(m=>{const n={...m};delete n[e.id];return n;});
                          }}>Link</button>
                        )}
                        {!e.reviewed&&(linked||pendingLink)&&(
                          <button className="btn btn-xs btn-primary" onClick={()=>{
                            logAndReview(e,linked?.id||pendingLink);
                            if(pendingLink) setLinkMap(m=>{const n={...m};delete n[e.id];return n;});
                          }}>Log</button>
                        )}
                      </div>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      )}
    </div>
  );
}

/* ── APP ────────────────────────────────────────────────── */
function App(){
  const [authed,setAuthed]=useState(false);
  const [tab,setTab]=useState("command");
  // Start with seed data immediately so the CRM is never empty
  const [contacts,setContacts]=useState(CONTACTS_SEED);
  const [opportunities,setOpportunities]=useState(OPPS_SEED);
  const [tasks,setTasks]=useState([]);
  const [correspondence,setCorrespondence]=useState([]);
  const [bccEmails,setBccEmails]=useState([]);
  const [loading,setLoading]=useState(false);
  const [fbStatus,setFbStatus]=useState("connecting"); // "connecting"|"live"|"local"
  const [syncStatus,setSyncStatus]=useState("ok");

  // Load from Supabase on auth — seed if empty, fall back to local data silently on error
  useEffect(()=>{
    if(!authed) return;
    const load=async()=>{
      try{
        const {data:dbContacts,error:cErr}=await DB.from("contacts").select("*");
        if(cErr) throw cErr;
        if(!dbContacts||dbContacts.length===0){
          // First run — seed the database (local state already has seed data)
          const {error:e1}=await DB.from("contacts").upsert(CONTACTS_SEED);
          if(e1) throw e1;
          const {error:e2}=await DB.from("opportunities").upsert(OPPS_SEED);
          if(e2) throw e2;
        } else {
          // Load persisted data from Supabase
          setContacts(dbContacts);
          const {data:dbOpps}=await DB.from("opportunities").select("*");
          if(dbOpps&&dbOpps.length>0) setOpportunities(dbOpps);
          const {data:dbTasks}=await DB.from("tasks").select("*");
          if(dbTasks) setTasks(dbTasks);
          const {data:dbCorr}=await DB.from("correspondence").select("*");
          if(dbCorr) setCorrespondence(dbCorr);
          const {data:dbBcc}=await DB.from("bcc_emails").select("*").order("received_at",{ascending:false});
          if(dbBcc) setBccEmails(dbBcc);
        }
        setFbStatus("live");
      }catch(e){
        console.warn("Supabase unavailable, running on local data:",e);
        setFbStatus("local");
      }
    };
    load();
  },[authed]);

  // CRUD: update local state immediately, sync to Supabase in background
  const sbWrite=(fn)=>{
    if(fbStatus!=="live") return Promise.resolve();
    setSyncStatus("loading");
    return fn().then(()=>setSyncStatus("ok")).catch(e=>{setSyncStatus("error");console.warn(e);});
  };

  const saveContact=useCallback((c)=>{
    setContacts(prev=>{const ex=prev.find(x=>x.id===c.id);return ex?prev.map(x=>x.id===c.id?c:x):[...prev,c];});
    return sbWrite(async()=>{const {error}=await DB.from("contacts").upsert(c);if(error)throw error;});
  },[fbStatus]);
  const deleteContact=useCallback((id)=>{
    setContacts(prev=>prev.filter(x=>x.id!==id));
    return sbWrite(async()=>{const {error}=await DB.from("contacts").delete().eq("id",id);if(error)throw error;});
  },[fbStatus]);
  const saveOpp=useCallback((o)=>{
    setOpportunities(prev=>{const ex=prev.find(x=>x.id===o.id);return ex?prev.map(x=>x.id===o.id?o:x):[...prev,o];});
    return sbWrite(async()=>{const {error}=await DB.from("opportunities").upsert(o);if(error)throw error;});
  },[fbStatus]);
  const deleteOpp=useCallback((id)=>{
    setOpportunities(prev=>prev.filter(x=>x.id!==id));
    return sbWrite(async()=>{const {error}=await DB.from("opportunities").delete().eq("id",id);if(error)throw error;});
  },[fbStatus]);
  const saveTask=useCallback((t)=>{
    setTasks(prev=>{const ex=prev.find(x=>x.id===t.id);return ex?prev.map(x=>x.id===t.id?t:x):[...prev,t];});
    return sbWrite(async()=>{const {error}=await DB.from("tasks").upsert(t);if(error)throw error;});
  },[fbStatus]);
  const deleteTask=useCallback((id)=>{
    setTasks(prev=>prev.filter(x=>x.id!==id));
    return sbWrite(async()=>{const {error}=await DB.from("tasks").delete().eq("id",id);if(error)throw error;});
  },[fbStatus]);
  const saveNote=useCallback((n)=>{
    setCorrespondence(prev=>{const ex=prev.find(x=>x.id===n.id);return ex?prev.map(x=>x.id===n.id?n:x):[...prev,n];});
    return sbWrite(async()=>{const {error}=await DB.from("correspondence").upsert(n);if(error)throw error;});
  },[fbStatus]);
  const deleteNote=useCallback((id)=>{
    setCorrespondence(prev=>prev.filter(x=>x.id!==id));
    return sbWrite(async()=>{const {error}=await DB.from("correspondence").delete().eq("id",id);if(error)throw error;});
  },[fbStatus]);
  const saveBccEmail=useCallback((b)=>{
    setBccEmails(prev=>prev.map(x=>x.id===b.id?b:x));
    return sbWrite(async()=>{const {error}=await DB.from("bcc_emails").upsert(b);if(error)throw error;});
  },[fbStatus]);

  if(!authed) return <AuthScreen onAuth={()=>setAuthed(true)}/>;

  const navItems=[
    {key:"command",label:"⌂ Command Center"},
    {key:"contacts",label:"👥 Contacts"},
    {key:"pipelines",label:"📊 Pipelines"},
    {key:"reports",label:"📄 Reports"},
    {key:"messages",label:"📬 Messages"},
    {key:"sdr",label:"🤖 SDR Agent",disabled:true}
  ];

  const statusLabel={
    connecting:"Connecting to Supabase…",
    live:syncStatus==="loading"?"Syncing…":syncStatus==="error"?"Sync error — changes saved locally":"Live · Supabase",
    local:"Local mode — check Supabase connection"
  }[fbStatus]||"";
  const statusColor={connecting:"#b8922a",live:syncStatus==="error"?"#c0392b":"#4caf80",local:"#d4681a"}[fbStatus];

  return (
    <div>
      <div className="topbar">
        <div className="logo">
          <div className="logo-sq">TS</div>
          <div><div className="logo-name">TIIP / SAIL CRM</div><div className="logo-sub">v2 · {contacts.length} contacts</div></div>
        </div>
        <div className="topbar-right">
          <span style={{fontSize:11}}>{new Date().toLocaleDateString("en-US",{month:"short",day:"numeric",year:"numeric"})}</span>
        </div>
      </div>
      <div className="sync-bar">
        <div className={`sync-dot${fbStatus==="connecting"||syncStatus==="loading"?" pulse":""}`} style={{background:statusColor}}/>
        <span>{statusLabel}</span>
        {fbStatus==="local"&&<span style={{marginLeft:8,fontSize:11,opacity:.7}}>· All edits work but won't persist between sessions until Firebase rules are renewed</span>}
      </div>
      <div className="nav no-print">
        {navItems.map(n=>(
          <button key={n.key}
            className={`nav-btn${tab===n.key?" active":""}`}
            onClick={()=>!n.disabled&&setTab(n.key)}
            title={n.disabled?"Coming soon — SDR Agent not yet active":""}
            style={n.disabled?{color:"#b0c4b8",cursor:"not-allowed",opacity:.55}:{}}>
            {n.label}{n.disabled&&<span style={{fontSize:9,marginLeft:5,background:"#e8f0eb",color:"#6b8070",padding:"1px 5px",borderRadius:10,fontWeight:700,verticalAlign:"middle"}}>SOON</span>}
          </button>
        ))}
      </div>
      <div className="main">
        {tab==="command"&&<CommandCenter contacts={contacts} opportunities={opportunities} tasks={tasks}
          saveTask={saveTask} deleteTask={deleteTask} onViewContact={c=>{setTab("contacts");}}
          bccEmails={bccEmails} saveBccEmail={saveBccEmail} saveNote={saveNote}/>}
        {tab==="contacts"&&<ContactsView contacts={contacts} opportunities={opportunities} correspondence={correspondence}
          bccEmails={bccEmails} saveContact={saveContact} deleteContact={deleteContact} saveNote={saveNote} deleteNote={deleteNote}/>}
        {tab==="messages"&&<MessagesView bccEmails={bccEmails} contacts={contacts} saveBccEmail={saveBccEmail} saveNote={saveNote}/>}
        {tab==="pipelines"&&<PipelinesView contacts={contacts} opportunities={opportunities} saveOpp={saveOpp} deleteOpp={deleteOpp}/>}
        {tab==="reports"&&<ReportsView contacts={contacts} opportunities={opportunities}/>}
      </div>
    </div>
  );
}

ReactDOM.render(<App/>, document.getElementById("root"));
</script>
</body>
</html>
